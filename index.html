<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ग्राम भूमि रिकॉर्ड डैशबोर्ड | हल्का 28 एवं 43</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Devanagari:wght@400;500;600;700;800;900&family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <!-- Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
    
    <style>
        :root {
            --royal: #1a1a6e;
            --royal-mid: #2d2db0;
            --royal-light: #f0f4ff;
            --gold: #c5a059;
            --gold-light: #fcf8f1;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --bg-body: #f8fafc;
            --shadow-card: 0 4px 20px rgba(0, 0, 0, 0.06);
            --shadow-hover: 0 10px 30px rgba(26, 26, 110, 0.12);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', 'Noto Sans Devanagari', sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            line-height: 1.6;
            min-height: 100vh;
        }

        /* ── Header ── */
        .header {
            background: linear-gradient(135deg, var(--royal) 0%, var(--royal-mid) 100%);
            color: #fff;
            padding: 30px 20px 60px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .header::after {
            content: "";
            position: absolute;
            bottom: -50px;
            left: 0;
            right: 0;
            height: 100px;
            background: var(--bg-body);
            border-radius: 50% 50% 0 0;
        }

        .header h1 {
            font-family: 'Noto Sans Devanagari', sans-serif;
            font-size: 28px;
            font-weight: 900;
            margin-bottom: 8px;
            letter-spacing: -0.01em;
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
        }

        .header p {
            font-size: 14px;
            font-weight: 600;
            opacity: 0.85;
            text-transform: uppercase;
            letter-spacing: 0.15em;
        }

        .container {
            max-width: 1100px;
            margin: -40px auto 60px;
            padding: 0 20px;
            position: relative;
            z-index: 10;
        }

        /* ── Tab Bar ── */
        .tab-bar {
            display: flex;
            gap: 8px;
            background: #fff;
            padding: 8px;
            border-radius: 18px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            margin-bottom: 24px;
            overflow-x: auto;
            scrollbar-width: none; /* Firefox */
        }
        .tab-bar::-webkit-scrollbar { display: none; }

        .tab-btn {
            padding: 10px 22px;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            font-weight: 700;
            font-size: 14px;
            transition: all 0.25s;
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-muted);
            background: transparent;
        }

        .tab-btn.active {
            background: var(--royal);
            color: #fff;
            box-shadow: 0 4px 12px rgba(26, 26, 110, 0.2);
        }

        .tab-btn:not(.active):hover {
            background: #f1f5f9;
            color: var(--royal);
        }

        /* ── Search Card ── */
        .search-card {
            background: #fff;
            border-radius: 24px;
            border: 1px solid var(--border);
            box-shadow: var(--shadow-card);
            padding: 32px;
            position: relative;
            overflow: hidden;
            margin-bottom: 30px;
        }

        .search-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; height: 4px;
            background: linear-gradient(90deg, var(--royal), var(--gold));
        }

        .form-label {
            display: block;
            font-size: 12px; font-weight: 800; color: var(--text-muted);
            text-transform: uppercase; letter-spacing: 0.1em;
            margin-bottom: 8px;
        }

        .form-select, .form-input {
            width: 100%; padding: 14px 18px; border: 2px solid var(--border);
            border-radius: 12px; font-family: inherit; font-size: 15px;
            font-weight: 700; color: var(--text-main); background: #f8fafc;
            outline: none; transition: all 0.2s;
        }

        .form-select:focus, .form-input:focus {
            border-color: var(--royal); background: #fff;
            box-shadow: 0 0 0 4px rgba(26, 26, 110, 0.08);
        }

        .btn-search {
            width: 100%; padding: 16px; background: var(--royal);
            color: #fff; border: none; border-radius: 14px;
            font-size: 16px; font-weight: 800; cursor: pointer;
            transition: all 0.2s; box-shadow: 0 4px 15px rgba(26, 26, 110, 0.3);
        }

        .btn-search:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(26, 26, 110, 0.4); }

        /* ── Badges ── */
        .type-badge {
            display: inline-block; padding: 4px 10px; border-radius: 8px;
            font-size: 11px; font-weight: 800; text-transform: uppercase;
        }
        .type-badge.sinchai { background: #d1fae5; color: #065f46; }
        .type-badge.asinchai { background: #fef3c7; color: #92400e; }
        .type-badge.danger { background: #fee2e2; color: #b91c1c; }
        .type-badge.nistar { background: #ede9fe; color: #6b21a8; }
        .type-badge.muted { background: #f1f5f9; color: #94a3b8; }

        /* ── Result Card ── */
        .result-card {
            background: #fff; border-radius: 20px; border: 1px solid var(--border);
            box-shadow: var(--shadow-card); overflow: hidden;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .result-card:hover { transform: translateY(-6px); box-shadow: var(--shadow-hover); }

        .card-header-khasra { background: linear-gradient(135deg, var(--royal), #2563eb); color: #fff; }
        .card-header-basra { background: linear-gradient(135deg, #065f46, #059669); color: #fff; }
        .card-header-nam { background: linear-gradient(135deg, #7c2d12, #ea580c); color: #fff; }

        /* ── Autocomplete ── */
        #khasraSuggest {
            position: absolute; z-index: 1000; background: #fff;
            border-radius: 12px; box-shadow: 0 10px 40px rgba(0,0,0,0.15);
            max-height: 300px; overflow-y: auto; border: 1px solid var(--border);
            display: none;
        }
        
        /* ── Portfolio ── */
        .portfolio-banner {
            background: linear-gradient(135deg, var(--royal), #1e40af);
            border-radius: 22px; color: #fff; padding: 26px;
            margin-bottom: 26px; box-shadow: 0 8px 30px rgba(26, 26, 110, 0.2);
        }
        .pf-stat { background: rgba(255,255,255,0.15); padding: 10px 18px; border-radius: 12px; text-align: center; }
        .pf-stat-label { font-size: 10px; font-weight: 700; opacity: 0.8; text-transform: uppercase; }
        .pf-stat-val { font-size: 18px; font-weight: 900; }

        /* ── Dashboard Stats ── */
        .dash-counter { transition: transform 0.3s; }
        .dash-counter:hover { transform: scale(1.03); }
        .dash-section { background: #fff; border-radius: 20px; padding: 24px; border: 1px solid var(--border); margin-bottom: 24px; }
        .dash-section-title { font-size: 18px; font-weight: 900; color: var(--royal); margin-bottom: 18px; display: flex; align-items: center; gap: 8px; }

        /* ── Utils ── */
        .hidden { display: none !important; }
        .loading-wrap { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px; }
        .spinner { width: 50px; height: 50px; border: 4px solid #e2e8f0; border-top-color: var(--royal); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Bar Chart */
        .bar-chart-row { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
        .bar-label { width: 100px; font-size: 12px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .bar-track { flex: 1; height: 10px; background: #e2e8f0; border-radius: 5px; overflow: hidden; }
        .bar-fill { height: 100%; border-radius: 5px; transition: width 1s ease-out; }
        .bar-val { width: 60px; font-size: 12px; font-weight: 800; text-align: right; }

    </style>
</head>
<body>

    <header class="header">
        <p>पटवारी हल्का 28 एवं 43</p>
        <h1>डिजिटल भूमि रिकॉर्ड डैशबोर्ड</h1>
        <div id="recordCountBadge" style="display:inline-block; margin-top:12px; padding:6px 14px; background:rgba(255,255,255,0.15); border-radius:20px; font-size:12px; font-weight:700; border:1px solid rgba(255,255,255,0.25);">⏳ डेटा लोड हो रहा है...</div>
    </header>

    <div class="container">
        
        <nav class="tab-bar">
            <button id="tab-dashboard" class="tab-btn active" onclick="switchTab('dashboard')">🏠 डैशबोर्ड</button>
            <button id="tab-khasra" class="tab-btn" onclick="switchTab('khasra')">📄 खसरा खोज</button>
            <button id="tab-basra" class="tab-btn" onclick="switchTab('basra')">👥 बसरा खोज</button>
            <button id="tab-nam" class="tab-btn" onclick="switchTab('nam')">📄 नाम खोज</button>
            <button id="tab-statistics" class="tab-btn" onclick="switchTab('statistics')">📊 सांख्यिकी</button>
            <button id="tab-gov" class="tab-btn" onclick="switchTab('gov')">🏛️ शासकीय रिकॉर्ड</button>
        </nav>

        <section class="search-card">
            <form id="searchForm" onsubmit="handleSearch(event)">
                <div style="display:grid; grid-template-columns:repeat(auto-fit, minmax(200px, 1fr)); gap:20px; margin-bottom:24px;">
                    <div>
                        <label class="form-label">🏘️ ग्राम चुनें</label>
                        <select id="villageInput" class="form-select" required>
                            <option value="" disabled selected>— ग्राम चुनें —</option>
                        </select>
                    </div>
                    
                    <div id="khasraGroup">
                        <label class="form-label">🔍 खसरा नंबर डालें</label>
                        <input type="text" id="khasraVal" class="form-input" placeholder="जैसे: 15/2" autocomplete="off">
                    </div>

                    <div id="basraGroup" class="hidden">
                        <label class="form-label">👥 बसरा नंबर चुनें</label>
                        <select id="basraVal" class="form-select" disabled>
                            <option value="" disabled selected>— पहले ग्राम चुनें —</option>
                        </select>
                    </div>

                    <div id="namGroup" class="hidden">
                        <label class="form-label">👤 भूमिस्वामी का नाम</label>
                        <input type="text" id="namVal" list="farmerList" class="form-input" placeholder="नाम टाइप करें..." disabled>
                        <datalist id="farmerList"></datalist>
                    </div>
                </div>
                
                <button type="submit" class="btn-search" id="searchBtn">
                    <span id="btnLabel">खोजें</span>
                </button>
            </form>
        </section>

        <!-- Suggestions Box for Khasra -->
        <div id="khasraSuggest"></div>

        <!-- Panels -->
        <div id="dashboardDiv"></div>
        <div id="statisticsDiv" class="hidden"></div>
        <div id="govDiv" class="hidden"></div>
        
        <div id="loadingDiv" class="loading-wrap hidden">
            <div class="spinner"></div>
            <p style="margin-top:16px; font-weight:700; color:var(--royal);">खोज जारी है...</p>
        </div>

        <div id="emptyDiv" class="hidden" style="text-align:center; padding:60px 20px; background:#fff; border-radius:24px; border:1px dashed var(--border);">
            <div style="font-size:48px; margin-bottom:12px;">🔍</div>
            <h3 style="font-weight:900; color:var(--text-main);">कोई रिकॉर्ड नहीं मिला</h3>
            <p style="color:var(--text-muted); font-weight:600;">कृपया इनपुट जाँचें या दूसरा ग्राम चुनें</p>
        </div>

        <div id="resultsDiv"></div>
        
    </div>

    <script>
        let records = [];
        let currentTab = 'dashboard';

        const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQ7w0RI9RMbD3vx841C6CHzFyHwwbX2L5zyhjabc2ov7AvR7OWzJfXgvbiPvV6oXvhJZj5RCmcOzq2r/pub?gid=1438447251&single=true&output=csv";

        function toast(msg, type = 'success') {
            const bg = { success: 'linear-gradient(to right,#059669,#047857)', error: 'linear-gradient(to right,#dc2626,#b91c1c)', info: 'linear-gradient(to right,#2563eb,#1a1a6e)' };
            Toastify({ text: msg, duration: 3500, gravity: 'top', position: 'right', style: { background: bg[type] || bg.info, borderRadius: '10px', fontWeight: '700' } }).showToast();
        }

        function getHalka(village) {
            if (village.includes('28')) return 'हल्का 28';
            if (village.includes('43')) return 'हल्का 43';
            return '';
        }

        function processCSVResults(results) {
            if (!results.data || results.data.length === 0) return false;
            records = results.data.map((o, i) => {
                let ownerRaw = o['भूमिस्वामी का नाम'] || 'अज्ञात';
                const nameMatches = [...ownerRaw.matchAll(/नाम\s*[-–]\s*([^\n\r]+)/g)];
                let ownerNames = nameMatches.map(m => m[1].trim()).filter(Boolean);
                if (ownerNames.length === 0) {
                    const fallback = ownerRaw.split(/\r?\n/)[0].replace(/^\(\d+\)/, '').trim();
                    if (fallback) ownerNames = [fallback];
                }

                let v = o['ग्राम'] || '';
                if (v === 'गबौद' || v === 'तिल्दा') v += ' (हल्का 43)';
                else if (v === 'छड़िया' || v === 'छेरकापुर') v += ' (हल्का 28)';

                // Parse area fields
                let kC = (o['खरीफ DCS में फसल '] || '').trim();
                let fN = (o['फसल का नाम'] || '').trim();
                let finalKharif = (kC && kC !== '--') ? kC : (fN && fN !== '--' ? fN : '');
                let finalRabi = (o['रबी DCS में फसल '] || o['रबी DCS में फसल_1'] || '').trim();
                if (finalRabi === '--') finalRabi = '';

                return {
                    id: i + 1,
                    v: v,
                    kn: o['खसरा नंबर'] || '',
                    bn: o['बसरा नंबर'] || '',
                    owner: ownerRaw,
                    ownerNames: ownerNames.length ? ownerNames : ['अज्ञात'],
                    area: parseFloat(o['क्षेत्रफल'] || 0).toFixed(3),
                    type: o['सिंचित / असिंचित'] || '',
                    nistar: o['निस्तार पत्रक विवरण'] || '',
                    charai: o['चराई भूमि है ?'] || '',
                    ceiling: o['सीलिंग भूमि है ?'] || '',
                    finalKharifCrop: finalKharif,
                    kharifCropArea: parseFloat(o['Crop Area'] || 0).toFixed(3),
                    finalRabiCrop: finalRabi,
                    rabiCropArea: parseFloat(o['Crop Area_1'] || 0).toFixed(3),
                    isDufasali: finalKharif !== '' && finalRabi !== '',
                    dufasaliArea: (finalKharif !== '' && finalRabi !== '') ? Math.min(parseFloat(o['Crop Area'] || 0), parseFloat(o['Crop Area_1'] || 0)).toFixed(3) : '0.000',
                    naAreaK: parseFloat(o['NA Area'] || 0),
                    naAreaR: parseFloat(o['NA Area_1'] || 0),
                    fallowAreaK: parseFloat(o['Fallow Area'] || 0),
                    fallowAreaR: parseFloat(o['Fallow Area_1'] || 0)
                };
            }).filter(r => r.v && r.kn);
            return records.length > 0;
        }

        function loadData() {
            const badge = document.getElementById('recordCountBadge');
            const PROXY = 'https://api.allorigins.win/raw?url=' + encodeURIComponent(SHEET_URL);
            
            fetch(PROXY)
                .then(res => res.text())
                .then(csv => {
                    const r = Papa.parse(csv, { header: true, skipEmptyLines: 'greedy' });
                    if (processCSVResults(r)) {
                        fillVillages();
                        badge.textContent = `✅ ${records.length} रिकॉर्ड लोड`;
                        toast(`${records.length} रिकॉर्ड लोड हुए`, 'success');
                        showDashboard();
                    } else throw new Error();
                })
                .catch(() => {
                    badge.innerHTML = `❌ विफल &nbsp;<button onclick="loadData()">🔄</button>`;
                });
        }

        function fillVillages() {
            const sel = document.getElementById('villageInput');
            const grams = [...new Set(records.map(r => r.v))].sort();
            grams.forEach(v => { const o = document.createElement('option'); o.value = o.text = v; sel.appendChild(o); });
        }

        document.getElementById('villageInput').addEventListener('change', function() {
            const v = this.value;
            // Basra
            const bSel = document.getElementById('basraVal');
            const basras = [...new Set(records.filter(r => r.v === v).map(r => r.bn))].sort();
            bSel.innerHTML = '<option value="" disabled selected>— बसरा चुनें —</option>' + basras.map(b => `<option value="${b}">${b}</option>`).join('');
            bSel.disabled = false;
            // Names
            const nList = document.getElementById('farmerList');
            const names = [...new Set(records.filter(r => r.v === v).flatMap(r => r.ownerNames))].sort();
            nList.innerHTML = names.map(n => `<option value="${n}">`).join('');
            document.getElementById('namVal').disabled = false;
            // Suggest list for autocomplete
            window._khasraList = [...new Set(records.filter(r => r.v === v).map(r => r.kn))];
        });

        // Autocomplete
        (function() {
            const inp = document.getElementById('khasraVal');
            const box = document.getElementById('khasraSuggest');
            inp.addEventListener('input', () => {
                const q = inp.value.trim();
                if (!q || !window._khasraList) { box.style.display = 'none'; return; }
                const matching = window._khasraList.filter(k => k.startsWith(q)).slice(0, 10);
                if (!matching.length) { box.style.display = 'none'; return; }
                const rect = inp.getBoundingClientRect();
                box.style.cssText = `display:block; top:${rect.bottom + window.scrollY}px; left:${rect.left}px; width:${rect.width}px;`;
                box.innerHTML = matching.map(k => `<div style="padding:10px 15px; cursor:pointer; font-weight:700; border-bottom:1px solid #f1f5f9;" onclick="selectSuggest('${k}')">${k}</div>`).join('');
            });
            window.selectSuggest = (k) => { inp.value = k; box.style.display = 'none'; };
        })();

        function switchTab(tab) {
            currentTab = tab;
            const isS = ['khasra', 'basra', 'nam'].includes(tab);
            document.querySelector('.search-card').style.display = isS ? 'block' : 'none';
            document.getElementById('khasraGroup').className = (tab === 'khasra' ? '' : 'hidden');
            document.getElementById('basraGroup').className = (tab === 'basra' ? '' : 'hidden');
            document.getElementById('namGroup').className = (tab === 'nam' ? '' : 'hidden');
            
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.id === 'tab-' + tab));
            
            document.getElementById('dashboardDiv').className = (tab === 'dashboard' ? '' : 'hidden');
            document.getElementById('statisticsDiv').className = (tab === 'statistics' ? '' : 'hidden');
            document.getElementById('govDiv').className = (tab === 'gov' ? '' : 'hidden');
            document.getElementById('resultsDiv').innerHTML = '';
            document.getElementById('emptyDiv').className = 'hidden';

            if (tab === 'dashboard') showDashboard();
            if (tab === 'statistics') showStatistics();
            if (tab === 'gov') showGovRecords();
        }

        function handleSearch(e) {
            e.preventDefault();
            const v = document.getElementById('villageInput').value;
            if (!v) return toast('ग्राम चुनें', 'error');
            
            let found = [];
            if (currentTab === 'khasra') {
                const val = document.getElementById('khasraVal').value.trim();
                found = records.filter(r => r.v === v && r.kn === val);
            } else if (currentTab === 'basra') {
                const val = document.getElementById('basraVal').value;
                found = records.filter(r => r.v === v && r.bn === val);
            } else if (currentTab === 'nam') {
                const val = document.getElementById('namVal').value.trim();
                found = records.filter(r => r.v === v && r.ownerNames.includes(val));
            }
            renderResults(found, v);
        }

        function getStatusBadgesHTML(r) {
            const isIrrigated = r.type && !r.type.includes('असिंचित');
            const irBadge = isIrrigated ? '<span class="type-badge sinchai">💧 सिंचित</span>' : '<span class="type-badge asinchai">🌱 असिंचित</span>';
            const isGrazing = (r.charai && (r.charai.includes('हाँ') || r.charai.includes('हा'))) || (r.nistar && (r.nistar.includes('चराई') || r.nistar.includes('गौठान')));
            const grBadge = isGrazing ? '<span class="type-badge danger">🌿 चराई भूमि</span>' : '<span class="type-badge muted">🌿 नहीं</span>';
            const isCeiling = (r.ceiling && (r.ceiling.includes('हाँ') || r.ceiling.includes('हा'))) || (r.owner && r.owner.includes('सीलिंग'));
            const ceBadge = isCeiling ? '<span class="type-badge danger">⚖️ सीलिंग भूमि</span>' : '<span class="type-badge muted">⚖️ नहीं</span>';
            const hasNistar = r.nistar && r.nistar.trim() !== '' && r.nistar !== 'नहीं' && r.nistar !== '-';
            const niBadge = hasNistar ? '<span class="type-badge nistar">📜 निस्तार पत्रक</span>' : '<span class="type-badge muted">📜 नहीं</span>';

            return `<div style="display:flex; gap:6px; flex-wrap:wrap; margin-bottom:12px;">${irBadge} ${grBadge} ${ceBadge} ${niBadge}</div>`;
        }

        function renderResults(found, village) {
            const res = document.getElementById('resultsDiv');
            const emp = document.getElementById('emptyDiv');
            res.innerHTML = '';
            if (!found.length) { emp.className = ''; return; }
            emp.className = 'hidden';

            if (currentTab === 'basra' || currentTab === 'nam') {
                const totalArea = found.reduce((s, r) => s + parseFloat(r.area), 0).toFixed(3);
                const title = currentTab === 'basra' ? 'बसरा' : 'भूमिस्वामी';
                const val = currentTab === 'basra' ? found[0].bn : document.getElementById('namVal').value;
                res.innerHTML = `
                    <div class="portfolio-banner">
                        <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:15px;">
                            <div>
                                <p style="font-size:11px; font-weight:800; text-transform:uppercase; opacity:0.7;">भूमिस्वामी पोर्टफोलियो</p>
                                <h2 style="font-size:24px; font-weight:900;">${currentTab === 'basra' ? found[0].owner : val}</h2>
                                <p style="font-size:14px; opacity:0.8; margin-top:2px;">ग्राम: ${village} | ${title}: ${val}</p>
                            </div>
                            <div style="display:flex; gap:12px;">
                                <div class="pf-stat"><p class="pf-stat-label">खसरे</p><p class="pf-stat-val">${found.length}</p></div>
                                <div class="pf-stat"><p class="pf-stat-label">क्षेत्रफल</p><p class="pf-stat-val">${totalArea} <span style="font-size:13px;">हे.</span></p></div>
                            </div>
                        </div>
                    </div>
                `;
            }

            const grid = document.createElement('div');
            grid.style.cssText = 'display:grid; grid-template-columns:repeat(auto-fill, minmax(300px, 1fr)); gap:22px;';
            found.forEach(r => {
                const card = document.createElement('div');
                card.className = 'result-card';
                card.innerHTML = `
                    <div class="card-header-${currentTab === 'nam' ? 'khasra' : currentTab}" style="padding:18px 20px; display:flex; justify-content:space-between; align-items:center;">
                        <div>
                            <p style="font-size:10px; font-weight:800; opacity:0.75; text-transform:uppercase;">${currentTab === 'basra' ? 'बसरा' : 'खसरा'} नंबर</p>
                            <p class="card-kn">${currentTab === 'basra' ? r.bn : r.kn}</p>
                        </div>
                        <button class="btn-pdf" onclick="printSingle('${r.kn}')">🖨️ प्रिंट</button>
                    </div>
                    <div style="padding:22px;">
                        ${getStatusBadgesHTML(r)}
                        <div style="margin-bottom:15px;">
                            <p style="font-size:10px; font-weight:800; color:var(--text-muted); text-transform:uppercase; margin-bottom:4px;">भूमिस्वामी</p>
                            <p style="font-size:15px; font-weight:800; line-height:1.4;">${r.owner}</p>
                        </div>
                        <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; border-top:1px solid #f1f5f9; padding-top:15px;">
                            <div class="stat-chip"><p class="stat-chip-label">रकबा (हे.)</p><p class="stat-chip-val">${r.area}</p></div>
                            <div class="stat-chip"><p class="stat-chip-label">बसरा नं.</p><p class="stat-chip-val">${r.bn}</p></div>
                        </div>
                        <div style="margin-top:15px; border-top:1px solid #f1f5f9; padding-top:15px;">
                            <p style="font-size:12px; font-weight:800; color:var(--text-muted); margin-bottom:8px;">🌾 फसल विवरण</p>
                            <div style="display:flex; flex-direction:column; gap:6px;">
                                <div style="display:flex; justify-content:space-between; font-size:13px;">
                                    <span style="font-weight:700; color:#065f46;">खरीफ: ${r.finalKharifCrop || '—'}</span>
                                    <span style="font-weight:800;">${r.kharifCropArea > 0 ? r.kharifCropArea + ' हे.' : ''}</span>
                                </div>
                                <div style="display:flex; justify-content:space-between; font-size:13px;">
                                    <span style="font-weight:700; color:#1e40af;">रबी: ${r.finalRabiCrop || '—'}</span>
                                    <span style="font-weight:800;">${r.rabiCropArea > 0 ? r.rabiCropArea + ' हे.' : ''}</span>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
            res.appendChild(grid);
        }

        // --- Stats & Gov (Basic Implementations to restore logic) ---
        function showDashboard() {
            const dash = document.getElementById('dashboardDiv');
            const totalArea = records.reduce((s, r) => s + parseFloat(r.area), 0).toFixed(3);
            const sinchai = records.filter(r => r.type && !r.type.includes('असिंचित')).length;
            const vilCount = new Set(records.map(r => r.v)).size;
            dash.innerHTML = `
                <div style="display:grid; grid-template-columns:repeat(auto-fit, minmax(200px, 1fr)); gap:20px; margin-bottom:30px;">
                    <div class="dash-section dash-counter" style="background:linear-gradient(135deg, var(--royal), #3b5bdb); color:#fff; text-align:center;">
                        <p class="pf-stat-label" style="opacity:0.7;">कुल ग्राम</p>
                        <p style="font-size:36px; font-weight:900;">${vilCount}</p>
                    </div>
                    <div class="dash-section dash-counter" style="background:linear-gradient(135deg, #065f46, #34d399); color:#fff; text-align:center;">
                        <p class="pf-stat-label" style="opacity:0.7;">कुल खसरे</p>
                        <p style="font-size:36px; font-weight:900;">${records.length}</p>
                    </div>
                    <div class="dash-section dash-counter" style="background:linear-gradient(135deg, #ea580c, #fbbf24); color:#fff; text-align:center;">
                        <p class="pf-stat-label" style="opacity:0.7;">कुल रकबा (हे.)</p>
                        <p style="font-size:32px; font-weight:900;">${totalArea}</p>
                    </div>
                    <div class="dash-section dash-counter" style="background:linear-gradient(135deg, #2563eb, #60a5fa); color:#fff; text-align:center;">
                        <p class="pf-stat-label" style="opacity:0.7;">सिंचित खसरे</p>
                        <p style="font-size:36px; font-weight:900;">${sinchai}</p>
                    </div>
                </div>
                <div class="dash-section">
                    <h2 class="dash-section-title">ग्रामवार सारांश</h2>
                    <div id="dashGramGrid" style="display:grid; grid-template-columns:repeat(auto-fill, minmax(250px, 1fr)); gap:20px;"></div>
                </div>
            `;
            const grid = document.getElementById('dashGramGrid');
            const grams = [...new Set(records.map(r => r.v))].sort();
            grid.innerHTML = '';
            grams.forEach(g => {
                const gr = records.filter(r => r.v === g);
                const gArea = gr.reduce((s, r) => s + parseFloat(r.area), 0).toFixed(3);
                grid.innerHTML += `
                    <div style="padding:18px; border:1px solid var(--border); border-radius:16px;">
                        <p style="font-weight:900; color:var(--royal); font-size:16px;">${g}</p>
                        <div style="display:flex; justify-content:space-between; margin-top:10px; font-size:13px; font-weight:700;">
                            <span>खसरे: ${gr.length}</span>
                            <span>रकबा: ${gArea} हे.</span>
                        </div>
                    </div>
                `;
            });
        }

        function showStatistics() {
            const stat = document.getElementById('statisticsDiv');
            stat.innerHTML = `<div class="dash-section">
                <h2 class="dash-section-title">📊 विस्तृत आँकड़े</h2>
                <p style="text-align:center; padding:40px; color:var(--text-muted); font-weight:700;">आगामी अपडेट में चार्ट्स उपलब्ध होंगे।</p>
            </div>`;
        }

        function showGovRecords() {
            const gov = document.getElementById('govDiv');
            gov.innerHTML = `
            <div class="dash-section">
                <h2 class="dash-section-title">🏛️ शासकीय भूमि रिकॉर्ड्स</h2>
                <div style="padding:20px; text-align:center; background:#fffbeb; border:1px solid #fde68a; border-radius:12px;">
                    <p style="font-weight:700; color:#92400e;">शासकीय भूमि, चराई और निस्तार का विवरण यहाँ देखें।</p>
                </div>
            </div>`;
        }

        function printSingle(kn) {
            window.open('https://docs.google.com/spreadsheets/d/e/2PACX-1vQ7w0RI9RMbD3vx841C6CHzFyHwwbX2L5zyhjabc2ov7AvR7OWzJfXgvbiPvV6oXvhJZj5RCmcOzq2r/pubhtml', '_blank');
        }

        // Initialize
        loadData();

    </script>
</body>
